<!DOCTYPE html>
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#3b82f6');
  grad.addColorStop(1, '#8b5cf6');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();
  // Mic icon
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'white';
  ctx.lineWidth = s * 0.03;
  const cx = s/2, cy = s*0.4;
  const mw = s*0.1, mh = s*0.17;
  ctx.beginPath();
  ctx.roundRect(cx-mw, cy-mh, mw*2, mh*2, mw);
  ctx.fill();
  // Arc
  ctx.beginPath();
  ctx.arc(cx, cy+mh*0.3, mw*1.7, 0, Math.PI);
  ctx.stroke();
  // Stem
  ctx.beginPath();
  ctx.moveTo(cx, cy+mh*0.3+mw*1.7);
  ctx.lineTo(cx, cy+mh*0.3+mw*1.7+s*0.06);
  ctx.stroke();
  // Base
  ctx.beginPath();
  ctx.moveTo(cx-s*0.06, cy+mh*0.3+mw*1.7+s*0.06);
  ctx.lineTo(cx+s*0.06, cy+mh*0.3+mw*1.7+s*0.06);
  ctx.stroke();
  // Text
  ctx.font = `bold ${s*0.07}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('GITAM', cx, s*0.88);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
// Download
['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = `icon-${c.width}.png`;
  a.href = c.toDataURL();
  a.click();
});
</script>
</body>
</html>
